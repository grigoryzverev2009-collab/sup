<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Научный дозор</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{
  --bg:#0f172a;--surface:#111827;--surface2:#020617;--border:#1f2937;
  --text:#e5e7eb;--text2:#9ca3af;--text3:#6b7280;
  --primary:#2f81f7;--success:#10b981;--error:#ef4444;--warn:#f59e0b;--accent:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.app{max-width:900px;margin:0 auto;padding:16px}
.site-header{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px}
.site-header h1{font-size:22px;color:#fff;font-weight:700}
.site-header .tagline{font-size:13px;color:var(--text2);margin-top:2px}
.site-header small{font-size:11px;color:var(--text3);text-align:right}
.card{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 0 0 1px rgba(15,23,42,.8)}
.card h2{font-size:17px;color:#fff;margin-bottom:10px}
.btn{border:none;cursor:pointer;border-radius:999px;padding:10px 18px;font-size:14px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-error{background:var(--error);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.btn-accent{background:var(--accent);color:#fff}
.btn-warn{background:var(--warn);color:#000}
.btn-full{width:100%;justify-content:center}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.screen{display:none}.screen.active{display:block}
.menu-item{display:flex;justify-content:space-between;align-items:center;padding:12px 8px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s;border-radius:8px}
.menu-item:hover{background:var(--surface2);padding-left:14px}
.menu-item:last-child{border-bottom:none}
.menu-item-info span{font-size:15px;font-weight:500}
.menu-item-info small{display:block;color:var(--text3);font-size:12px;margin-top:2px}
.arrow{color:var(--text3);font-size:18px}
.top-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;font-size:13px}
.top-pill{padding:4px 10px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.top-pill strong{color:#fff}
.back-btn{display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:var(--primary);font-size:13px;margin:4px 0 12px;background:none;border:none;font-family:inherit}
.news-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.avatar{width:36px;height:36px;border-radius:999px;background:linear-gradient(135deg,#1d4ed8,#2563eb);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.news-meta{font-size:12px;color:var(--text2)}
.channel-name{font-size:14px;font-weight:600;color:#fff}
.news-title{font-size:16px;font-weight:700;margin:6px 0 4px;color:#fff}
.news-body{font-size:14px;color:var(--text);line-height:1.6}
.tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.pill{display:inline-block;padding:2px 8px;font-size:11px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.choice-row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.choice-btn{flex:1;min-width:140px;padding:8px 12px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
.choice-btn.active{border-color:var(--primary);background:#1d4ed820;color:#fff}
.moderation-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.result-badge{margin-top:10px;font-size:13px;padding:10px 12px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);line-height:1.6}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.stat-box{background:var(--surface2);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border)}
.stat-label{color:var(--text2);font-size:11px;margin-bottom:4px}
.stat-value{font-size:18px;font-weight:700;color:#fff}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.92);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal.open{display:flex}
.modal-inner{background:var(--surface);border-radius:20px;padding:20px;max-width:380px;width:100%;border:1px solid var(--border)}
.block-chip{display:flex;align-items:flex-start;padding:10px 12px;margin:4px 0;border-radius:12px;background:var(--surface2);border:1.5px solid var(--border);font-size:13px;cursor:pointer;width:100%;text-align:left;transition:all .15s;color:var(--text);font-family:inherit;line-height:1.5}
.block-chip.active{background:#16a34a20;border-color:#16a34a;color:#fff}
.badge-tag{display:inline-block;padding:3px 10px;border-radius:999px;background:var(--primary);color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:6px}
.quiz-news-box{background:var(--surface2);border-radius:16px;padding:20px;border-left:4px solid var(--primary);margin-bottom:16px;font-size:15px;line-height:1.8;color:var(--text);font-style:italic}
.quiz-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.quiz-btn{padding:14px 10px;border:2px solid var(--border);background:var(--surface2);color:var(--text);border-radius:14px;cursor:pointer;font-size:14px;font-weight:700;transition:all .2s;font-family:inherit}
.quiz-btn:hover:not(:disabled){border-color:var(--primary);background:#1d4ed815;transform:translateY(-2px)}
.quiz-btn.correct-ans{background:var(--success)!important;border-color:var(--success)!important;color:#fff!important}
.quiz-btn.wrong-ans{background:var(--error)!important;border-color:var(--error)!important;color:#fff!important}
.quiz-btn:disabled{cursor:not-allowed}
.quiz-feedback{padding:14px;border-radius:12px;margin-top:10px;font-size:14px;line-height:1.6;border-left:4px solid;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.ok{background:#10b98115;color:#6ee7b7;border-color:var(--success)}
.quiz-feedback.bad{background:#ef444415;color:#fca5a5;border-color:var(--error)}
.quiz-feedback.meh{background:#f59e0b15;color:#fcd34d;border-color:var(--warn)}
.progress-bar{height:6px;background:var(--border);border-radius:3px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));border-radius:3px;transition:width .4s ease}
.q-counter{font-size:13px;color:var(--text2);font-weight:600;background:var(--surface2);padding:5px 12px;border-radius:8px;border:1px solid var(--border)}
.rating-table{width:100%;border-collapse:collapse}
.rating-table th{text-align:left;font-size:12px;color:var(--text3);padding:8px 12px;border-bottom:1px solid var(--border);font-weight:600}
.rating-table td{padding:10px 12px;font-size:14px;border-bottom:1px solid var(--border)}
.rating-table tr:last-child td{border-bottom:none}
.rating-table tbody tr:hover td{background:var(--surface2)}
.rank-num{font-weight:700;font-size:16px}
.ct-question-box{background:var(--surface2);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.ct-question-box p{font-size:15px;line-height:1.7;margin-bottom:12px;color:#fff}
.ct-options{display:flex;flex-direction:column;gap:8px}
.ct-opt{padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;line-height:1.5}
.ct-opt:hover:not(:disabled){border-color:var(--primary);background:#1d4ed815}
.ct-opt.correct-ct{border-color:var(--success)!important;background:#10b98120!important;color:#6ee7b7!important}
.ct-opt.wrong-ct{border-color:var(--error)!important;background:#ef444420!important;color:#fca5a5!important}
.ct-opt:disabled{cursor:not-allowed}
.tg-post{background:var(--surface2);border-radius:16px;padding:16px;margin-bottom:14px;border:1px solid var(--border)}
.tg-post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tg-ava{width:38px;height:38px;border-radius:999px;background:linear-gradient(135deg,#1a56db,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tg-channel{font-size:14px;font-weight:700;color:#fff}
.tg-subs{font-size:12px;color:var(--text2)}
.tg-text{font-size:14px;line-height:1.7;color:var(--text);margin-bottom:12px}
.tg-vote-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.tg-vote{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.tg-vote.ad-btn{background:#ef444420;border:1.5px solid var(--error);color:#fca5a5}
.tg-vote.notad-btn{background:#10b98120;border:1.5px solid var(--success);color:#6ee7b7}
.tg-vote.unsure-btn{background:#f59e0b20;border:1.5px solid var(--warn);color:#fcd34d}
.tg-vote:hover{opacity:.8;transform:translateY(-1px)}
.tg-explain{margin-top:10px;padding:12px;border-radius:10px;font-size:13px;line-height:1.6;display:none;border-left:4px solid}
.tg-explain.show{display:block}
.tg-explain.correct-exp{background:#10b98115;color:#6ee7b7;border-color:var(--success)}
.tg-explain.wrong-exp{background:#ef444415;color:#fca5a5;border-color:var(--error)}
.tg-explain.neutral-exp{background:#f59e0b15;color:#fcd34d;border-color:var(--warn)}
.ocr-drop{border:2px dashed var(--border);border-radius:16px;padding:40px 20px;text-align:center;
